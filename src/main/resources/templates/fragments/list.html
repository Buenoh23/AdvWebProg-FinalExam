<div th:fragment="requestList" id="request-list">

    <div th:if="${errorMessage != null}" class="error-msg">
        <span th:text="${errorMessage}"></span>
    </div>

    <table>
        <thead>
            <tr>
                <th>ID</th>
                <th>Title</th>
                <th>Category</th>
                <th>Urgency</th>
                <th>Status</th>
                <th>Date Submitted</th>
                <th>Actions</th>
            </tr>
        </thead>
        <tbody>
            <tr th:each="req : ${requests}">
                <td th:text="${req.id}"></td>
                <td th:text="${req.title}"></td>
                <td th:text="${req.category.name}"></td>
                <td th:text="${req.urgencyScore}" style="text-align: center; font-weight: bold;"></td>
                
                <td>
                    <span th:if="${req.status == 'SUBMITTED'}" style="color: orange; font-weight: bold;">SUBMITTED</span>
                    <span th:if="${req.status == 'IN_REVIEW'}" style="color: blue; font-weight: bold;">IN_REVIEW</span>
                    <span th:if="${req.status == 'RESOLVED'}" style="color: green; font-weight: bold;">RESOLVED</span>
                </td>
                
                <td th:text="${#temporals.format(req.createdAt, 'yyyy-MM-dd HH:mm')}"></td>
                
                <td>
                    <button th:if="${req.status == 'SUBMITTED'}" 
                            th:attr="hx-put='/main/' + ${req.id} + '?newStatus=IN_REVIEW'" 
                            hx-target="#request-list" hx-swap="outerHTML" 
                            style="background-color: #17a2b8; color: white; border: none; padding: 5px 10px; cursor: pointer; border-radius: 3px;">
                        Start Review
                    </button>
                    
                    <button th:if="${req.status == 'IN_REVIEW'}" 
                            th:attr="hx-put='/main/' + ${req.id} + '?newStatus=RESOLVED'" 
                            hx-target="#request-list" hx-swap="outerHTML" 
                            style="background-color: #28a745; color: white; border: none; padding: 5px 10px; cursor: pointer; border-radius: 3px;">
                        Resolve
                    </button>

                    <button th:attr="hx-delete='/main/' + ${req.id}" 
                            hx-target="#request-list" hx-swap="outerHTML" hx-confirm="Are you sure you want to delete this request?"
                            style="background-color: #dc3545; color: white; border: none; padding: 5px 10px; cursor: pointer; margin-left: 5px; border-radius: 3px;">
                        Delete
                    </button>
                </td>
            </tr>
            <tr th:if="${requests.isEmpty()}">
                <td colspan="7" style="text-align: center; color: gray;">No requests found.</td>
            </tr>
        </tbody>
    </table>
</div>
